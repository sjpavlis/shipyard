# =============================================================================
# Example: Spring Boot + MySQL CI/CD with Shipyard
# =============================================================================
# Same as spring-boot-workflow.yml but with MySQL env vars.
# For apps that connect to MySQL running on the VPS directly.
#
# Required GitHub Secrets:
#   - DROPLET_HOST:     Your VPS IP address
#   - DROPLET_SSH_KEY:  SSH private key for VPS access
#   - DB_USERNAME:      MySQL username
#   - DB_PASSWORD:      MySQL password
#   - DEPLOY_PAT:       GitHub PAT (if app needs it)
# =============================================================================

name: Deploy

on:
  workflow_dispatch:  # Manual trigger (change to push if you want auto-deploy)
  # push:
  #   branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # If your source is in a subdirectory (like intSDA's "fish/" folder):
      - name: Build JAR
        run: ./mvnw -B package --no-transfer-progress -DskipTests
        # working-directory: fish  # Uncomment if source is in a subfolder

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

      # Deploy using Shipyard
      - name: Get Shipyard
        run: git clone --depth 1 https://github.com/sjpavlis/shipyard.git .shipyard

      - name: Deploy to VPS
        run: |
          chmod +x .shipyard/scripts/deploy-app.sh
          .shipyard/scripts/deploy-app.sh
        env:
          APP_NAME: ${{ github.event.repository.name }}
          IMAGE: ghcr.io/${{ github.repository }}:latest
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_SSH_KEY: ${{ secrets.DROPLET_SSH_KEY }}
          REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY_USER: ${{ github.actor }}
          NETWORK_MODE: host
          ENV_VARS: |
            SPRING_DATASOURCE_URL=jdbc:mysql://localhost:3306/yourdb?createDatabaseIfNotExist=true
            SPRING_DATASOURCE_USERNAME=${{ secrets.DB_USERNAME }}
            SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }}
            GITHUB_DEPLOY_TOKEN=${{ secrets.DEPLOY_PAT }}
            GITHUB_DEPLOY_REPO=${{ github.repository }}
