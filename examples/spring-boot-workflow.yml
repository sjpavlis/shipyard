# =============================================================================
# Example: Full Spring Boot CI/CD with Shipyard
# =============================================================================
# Copy this to your project: .github/workflows/deploy.yml
#
# This workflow:
#   1. Builds the JAR with Maven
#   2. Builds and pushes a Docker image to ghcr.io
#   3. Deploys to your VPS using Shipyard's deploy script
#
# Required GitHub Secrets:
#   - DROPLET_HOST:     Your VPS IP address
#   - DROPLET_SSH_KEY:  SSH private key for VPS access
#   - APP_GITHUB_TOKEN: (optional) token passed to the app at runtime
#
# Version bumping via commit message:
#   - Default:   patch bump (1.0.0 → 1.0.1)
#   - [minor]:   minor bump (1.0.1 → 1.1.0)
#   - [major]:   major bump (1.1.0 → 2.0.0)
#   - [skip-deploy]: push image but don't deploy
# =============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:

  # ===========================================================================
  # Build the application
  # ===========================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: ./mvnw -B package --no-transfer-progress -DskipTests

      - name: Upload JAR
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1

  # ===========================================================================
  # Build Docker image and push to ghcr.io
  # ===========================================================================
  docker:
    name: Docker Push
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target

      # Auto-increment version based on commit message
      - name: Calculate version
        id: version
        run: |
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -n 1)
          if [ -z "$LATEST_TAG" ]; then
            VERSION="1.0.0"
          else
            VERSION="${LATEST_TAG#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
            COMMIT_MSG="${{ github.event.head_commit.message }}"
            if echo "$COMMIT_MSG" | grep -qi '\[major\]'; then
              MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
            elif echo "$COMMIT_MSG" | grep -qi '\[minor\]'; then
              MINOR=$((MINOR + 1)); PATCH=0
            else
              PATCH=$((PATCH + 1))
            fi
            VERSION="$MAJOR.$MINOR.$PATCH"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}

  # ===========================================================================
  # Deploy using Shipyard
  # ===========================================================================
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: docker
    if: "!contains(github.event.head_commit.message, '[skip-deploy]')"
    steps:
      - name: Get Shipyard
        run: git clone --depth 1 https://github.com/sjpavlis/shipyard.git .shipyard

      - name: Deploy to VPS
        run: |
          chmod +x .shipyard/scripts/deploy-app.sh
          .shipyard/scripts/deploy-app.sh
        env:
          APP_NAME: ${{ github.event.repository.name }}
          IMAGE: ghcr.io/${{ github.repository }}:latest
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_SSH_KEY: ${{ secrets.DROPLET_SSH_KEY }}
          REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY_USER: ${{ github.actor }}
          ENV_VARS: |
            GITHUB_TOKEN=${{ secrets.APP_GITHUB_TOKEN }}
